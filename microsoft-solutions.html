  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>/* =====================================================================\n   The Chief Negotiators — Microsoft Solutions Hub\n   Luxury advisory: deep black canvas, metallic bronze-gold, classical serif\n   ===================================================================== */\n\n:root {\n  /* Ink / surfaces */\n  --ink:        #0a0a0b;\n  --ink-2:      #0d0d0f;\n  --ink-3:      #111114;\n  --panel:      #15151a;\n  --panel-2:    #1b1b21;\n  --line:       rgba(212, 175, 110, 0.16);\n  --line-soft:  rgba(237, 231, 221, 0.08);\n\n  /* Metallic gold / bronze */\n  --gold-1:     #F2D79B;   /* light highlight */\n  --gold-2:     #D7A85F;   /* mid gold */\n  --gold-3:     #B07C3B;   /* bronze */\n  --gold-4:     #7d5224;   /* deep */\n  --gold-grad:  linear-gradient(135deg, #8a5e2c 0%, #e7c688 38%, #f4e2b4 52%, #cf9f5b 70%, #7d5224 100%);\n  --gold-grad-soft: linear-gradient(135deg, #B07C3B, #F2D79B 55%, #C8975A);\n\n  /* Text */\n  --text:       #EDE7DD;\n  --text-dim:   #C3BCAF;\n  --muted:      #8E887C;\n  --muted-2:    #6f6a60;\n\n  /* Type */\n  --display: \"Cormorant Garamond\", \"Times New Roman\", serif;\n  --label:   \"Jost\", system-ui, sans-serif;\n  --body:    \"Jost\", system-ui, sans-serif;\n\n  /* Rhythm */\n  --maxw: 1240px;\n  --gutter: clamp(20px, 5vw, 64px);\n  --radius: 4px;\n  --radius-lg: 6px;\n  --section-pad: clamp(72px, 10vw, 140px);\n  --ease: cubic-bezier(0.22, 1, 0.36, 1);\n}\n\n* { box-sizing: border-box; }\n\nhtml { scroll-behavior: smooth; }\n\nbody {\n  margin: 0;\n  background: var(--ink);\n  color: var(--text);\n  font-family: var(--body);\n  font-size: 17px;\n  line-height: 1.68;\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n  overflow-x: hidden;\n}\n\n/* Ambient texture: faint gold glow corners + grain */\nbody::before {\n  content: \"\";\n  position: fixed;\n  inset: 0;\n  pointer-events: none;\n  z-index: 0;\n  background:\n    radial-gradient(820px 520px at 8% -8%, rgba(199, 151, 90, 0.10), transparent 60%),\n    radial-gradient(720px 520px at 100% 4%, rgba(199, 151, 90, 0.07), transparent 55%);\n}\n\nimg { max-width: 100%; display: block; }\na { color: inherit; text-decoration: none; }\nbutton { font-family: inherit; cursor: pointer; }\n\n/* ---------- Layout helpers ---------- */\n.wrap { width: 100%; max-width: var(--maxw); margin-inline: auto; padding-inline: var(--gutter); position: relative; z-index: 1; }\n.section { padding-block: var(--section-pad); position: relative; }\n.section--alt { background: linear-gradient(180deg, var(--ink-2), var(--ink-3)); border-block: 1px solid var(--line-soft); }\n\n/* ---------- Type utilities ---------- */\n.eyebrow {\n  font-family: var(--label);\n  font-weight: 500;\n  font-size: 12.5px;\n  letter-spacing: 0.34em;\n  text-transform: uppercase;\n  color: var(--gold-2);\n  display: inline-flex;\n  align-items: center;\n  gap: 12px;\n  margin: 0 0 22px;\n}\n.eyebrow::before {\n  content: \"\";\n  width: 30px; height: 1px;\n  background: var(--gold-grad-soft);\n  display: inline-block;\n}\n.eyebrow--center { justify-content: center; }\n.eyebrow--center::after {\n  content: \"\";\n  width: 30px; height: 1px;\n  background: var(--gold-grad-soft);\n  display: inline-block;\n}\n\nh1, h2, h3 { font-family: var(--display); font-weight: 600; line-height: 1.06; margin: 0; letter-spacing: 0; }\n\n.display {\n  font-size: clamp(42px, 6.8vw, 88px);\n  font-weight: 700;\n  line-height: 1.0;\n  letter-spacing: -0.014em;\n}\n.h2 { font-size: clamp(30px, 4.4vw, 52px); font-weight: 600; letter-spacing: -0.008em; line-height: 1.04; }\n.h3 { font-size: clamp(21px, 2.5vw, 28px); font-weight: 600; }\n.lead { font-size: clamp(17px, 1.7vw, 20px); color: var(--text-dim); max-width: 62ch; }\n.muted { color: var(--muted); }\n\n.gold-text {\n  background: var(--gold-grad);\n  -webkit-background-clip: text;\n  background-clip: text;\n  color: transparent;\n  /* fallback */\n  -webkit-text-fill-color: transparent;\n}\n\n.section-head { max-width: 760px; margin-bottom: clamp(40px, 5vw, 64px); }\n.section-head.center { margin-inline: auto; text-align: center; }\n\n/* ---------- Buttons ---------- */\n.btn {\n  --bg: transparent;\n  display: inline-flex;\n  align-items: center;\n  gap: 11px;\n  font-family: var(--label);\n  font-weight: 500;\n  font-size: 14px;\n  letter-spacing: 0.14em;\n  text-transform: uppercase;\n  padding: 15px 30px;\n  border-radius: var(--radius);\n  border: 1px solid transparent;\n  transition: transform .35s var(--ease), box-shadow .35s var(--ease), background-color .35s var(--ease), color .35s var(--ease), border-color .35s var(--ease);\n  white-space: nowrap;\n}\n.btn svg { width: 16px; height: 16px; }\n.btn--gold {\n  background: var(--gold-grad);\n  color: #1a1206;\n  box-shadow: 0 10px 30px -12px rgba(215, 168, 95, 0.55);\n}\n.btn--gold:hover { transform: translateY(-2px); box-shadow: 0 18px 40px -14px rgba(215, 168, 95, 0.7); }\n.btn--ghost {\n  background: rgba(255,255,255,0.015);\n  color: var(--text);\n  border-color: var(--line);\n}\n.btn--ghost:hover { border-color: var(--gold-2); color: #fff; transform: translateY(-2px); }\n.btn--block { width: 100%; justify-content: center; }\n.btn[disabled] { opacity: .4; pointer-events: none; }\n\n/* ---------- Reveal animation ---------- */\n.reveal { opacity: 0; transform: translateY(26px); transition: opacity .9s var(--ease), transform .9s var(--ease); }\n.reveal.in { opacity: 1; transform: none; }\n.reveal[data-delay=\"1\"] { transition-delay: .08s; }\n.reveal[data-delay=\"2\"] { transition-delay: .16s; }\n.reveal[data-delay=\"3\"] { transition-delay: .24s; }\n.reveal[data-delay=\"4\"] { transition-delay: .32s; }\n@media (prefers-reduced-motion: reduce) {\n  .reveal { opacity: 1; transform: none; transition: none; }\n  html { scroll-behavior: auto; }\n}\n\n/* =====================================================================\n   NAV\n   ===================================================================== */\n.nav {\n  position: fixed; top: 0; left: 0; right: 0; z-index: 100;\n  transition: background-color .4s var(--ease), border-color .4s var(--ease), backdrop-filter .4s var(--ease);\n  border-bottom: 1px solid transparent;\n}\n.nav.scrolled {\n  background: rgba(8, 8, 9, 0.82);\n  backdrop-filter: blur(14px) saturate(1.2);\n  border-bottom-color: var(--line);\n}\n.nav__inner { display: flex; align-items: center; justify-content: space-between; height: 78px; }\n.brand { display: flex; align-items: center; gap: 14px; }\n.brand__mark { width: 34px; height: 40px; flex: none; }\n.brand__txt { display: flex; flex-direction: column; line-height: 1; }\n.brand__name { font-family: var(--display); font-weight: 700; font-size: 17px; letter-spacing: 0.13em; color: var(--text); white-space: nowrap; }\n.brand__sub { font-family: var(--label); font-size: 9.5px; letter-spacing: 0.32em; text-transform: uppercase; color: var(--gold-2); margin-top: 5px; }\n.nav__links { display: flex; align-items: center; gap: 34px; }\n.nav__links a { font-family: var(--label); font-size: 13.5px; letter-spacing: 0.06em; color: var(--text-dim); transition: color .3s; }\n.nav__links a:hover { color: var(--gold-1); }\n.nav__cta { display: flex; align-items: center; gap: 18px; }\n.nav__partner { font-family: var(--label); font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); }\n.nav__partner b { color: var(--gold-2); font-weight: 500; }\n.nav__burger { display: none; background: none; border: 0; color: var(--text); padding: 6px; }\n@media (max-width: 940px) {\n  .nav__links, .nav__partner { display: none; }\n  .nav__burger { display: inline-flex; }\n}\n\n/* =====================================================================\n   HERO\n   ===================================================================== */\n.hero { position: relative; padding-top: 168px; padding-bottom: 96px; overflow: hidden; }\n.hero__ring {\n  position: absolute; right: -8%; top: 50%; transform: translateY(-50%);\n  width: min(720px, 64vw); aspect-ratio: 1; pointer-events: none; opacity: .5;\n}\n.hero__grid { position: relative; z-index: 2; max-width: 940px; }\n.hero__partner-tag {\n  display: inline-flex; align-items: center; gap: 12px;\n  border: 1px solid var(--line); border-radius: 100px;\n  padding: 9px 18px 9px 14px; margin-bottom: 30px;\n  font-family: var(--label); font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-dim);\n  background: rgba(255,255,255,0.02);\n}\n.hero__partner-tag .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--gold-2); box-shadow: 0 0 0 4px rgba(215,168,95,0.18); }\n.hero__partner-tag b { color: var(--gold-1); font-weight: 600; }\n.hero h1 { margin-bottom: 26px; }\n.hero__sub { font-size: clamp(15px, 1.45vw, 17px); color: var(--text-dim); max-width: 58ch; margin: 0 0 38px; }\n.hero__actions { display: flex; flex-wrap: wrap; gap: 16px; align-items: center; }\n.hero__note { font-family: var(--label); font-size: 13px; letter-spacing: 0.04em; color: var(--muted); display: flex; align-items: center; gap: 9px; }\n.hero__note svg { width: 15px; height: 15px; color: var(--gold-2); }\n\n/* Stats strip */\n.stats {\n  margin-top: clamp(56px, 8vw, 92px);\n  display: grid; grid-template-columns: repeat(4, 1fr);\n  border: 1px solid var(--line); border-radius: var(--radius-lg);\n  background: linear-gradient(180deg, rgba(255,255,255,0.025), rgba(255,255,255,0));\n  position: relative; z-index: 2;\n}\n.stat { padding: 30px clamp(18px, 2.4vw, 34px); border-left: 1px solid var(--line-soft); }\n.stat:first-child { border-left: 0; }\n.stat__num { font-family: var(--display); font-weight: 700; font-size: clamp(30px, 3.6vw, 44px); line-height: 1; }\n.stat__lbl { font-family: var(--label); font-size: 12px; letter-spacing: 0.14em; text-transfor der: 1px solid var(--line); border-radius: 3px; flex: none; display: inline-flex; align-items: center; justify-content: center; transition: all .3s; }\n.interest .box svg { width: 12px; height: 12px; color: #1a1206; opacity: 0; }\n.interest.checked { border-color: var(--gold-2); color: var(--text); background: rgba(215,168,95,0.07); }\n.interest.checked .box { background: var(--gold-grad); border-color: transparent; }\n.interest.checked .box svg { opacity: 1; }\n\n.form-nav { display: flex; justify-content: space-between; gap: 14px; margin-top: 30px; }\n.form-nav .btn--ghost.hidden { visibility: hidden; }\n\n.review-list { display: flex; flex-direction: column; gap: 0; border: 1px solid var(--line); border-radius: var(--radius-lg); overflow: hidden; }\n.review-row { display: flex; justify-content: space-between; gap: 18px; padding: 15px 20px; border-bottom: 1px solid var(--line-soft); font-size: 14.5px; }\n.review-row:last-child { border-bottom: 0; }\n.review-row span:first-child { color: var(--muted); font-family: var(--label); font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase; }\n.review-row span:last-child { color: var(--text); text-align: right; max-width: 60%; }\n\n.form-success { text-align: center; padding: 24px 10px; display: none; }\n.form-success.show { display: block; animation: fadeUp .5s var(--ease); }\n.form-success .ok { width: 72px; height: 72px; margin: 0 auto 24px; border-radius: 50%; border: 1px solid var(--gold-2); display: flex; align-items: center; justify-content: center; background: rgba(215,168,95,0.08); }\n.form-success .ok svg { width: 32px; height: 32px; color: var(--gold-1); }\n.form-success h3 { font-size: 28px; margin-bottom: 14px; }\n.form-success p { color: var(--text-dim); max-width: 46ch; margin: 0 auto 8px; }\n\n/* =====================================================================\n   FOOTER\n   ===================================================================== */\n.footer { background: var(--ink-2); border- ass=\"stat__lbl\">Cloud Partner of the Year<\u002Fdiv><\u002Fdiv>\n      <div class=\"stat\"><div class=\"stat__num gold-text\">24/7<\u002Fdiv><div class=\"stat__lbl\">Critical Admin Support<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===================== HOW IT WORKS ===================== -->\n<section class=\"section section--alt\" id=\"how\">\n  <div class=\"wrap\">\n    <div class=\"section-head reveal\">\n      <p class=\"eyebrow\">The Partnership<\u002Fp>\n      <h2 class=\"h2\">A simple, trusted introduction —<br>then expert hands take over.<\u002Fh2>\n      <p class=\"lead\" style=\"margin-top:18px\">The Chief Negotiators doesn't sell technology or take a cut. We advocate for you, understand what you need, and personally introduce you to a partner we trust with our own clients.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"steps\">\n      <div class=\"step reveal\" data-delay=\"1\">\n        <div class=\"step__icon i-hand\"><\u002Fdiv>\n        <p class=\"step__no\">STEP <span>/ 01<\u002Fspan><\u002Fp>\n        <h3>You tell us what you need<\u002Fh3>\n        <p>Share the challenge you're facing — or just where you're curious. There's no obligation and nothing to buy from us.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"step reveal\" data-delay=\"2\">\n        <div class=\"step__icon i-link\"><\u002Fdiv>\n        <p class=\"step__no\">STEP <span>/ 02<\u002Fspan><\u002Fp>\n        <h3>We make the introduction<\u002Fh3>\n        <p>We connect you directly with the right specialists and make sure you're in excellent hands from the first conversation.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"step reveal\" data-delay=\"3\">\n        <div class=\"step__icon i-badge\"><\u002Fdiv>\n        <p class=\"step__no\">STEP <span>/ 03<\u002Fspan><\u002Fp>\n        <h3>Our partner delivers<\u002Fh3>\n        <p>A Certified Microsoft Gold Partner takes it from there — with the responsiveness and customer service we'd expect for ou crosoft-grade security — available to you through The Chief Negotiators.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"pp\" id=\"ppGrid\"><\u002Fdiv>\n    <p class=\"pp__note reveal\" style=\"justify-content:center\"><span class=\"i-check\"><\u002Fspan> CDR is included with BlueSky UC Direct Routing services at no extra cost.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===================== FIND YOUR FIT QUIZ ===================== -->\n<section class=\"section\" id=\"fit\">\n  <div class=\"wrap\">\n    <div class=\"section-head center reveal\">\n      <p class=\"eyebrow eyebrow--center\">Find Your Fit<\u002Fp>\n      <h2 class=\"h2\">Not sure where to start?<\u002Fh2>\n      <p class=\"lead\" style=\"margin:18px auto 0\">Answer three quick questions and we'll point you to the services most likely to move the needle for you.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"quiz reveal\" id=\"quiz\">\n      <div class=\"quiz__bar\"><i id=\"quizBar\"><\u002Fi><\u002Fdiv>\n      <div class=\"quiz__inner\" id=\"quizInner\"><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===================== WHY IT WORKS ===================== -->\n<section class=\"section\" id=\"why\">\n  <div class=\"wrap\">\n    <div class=\"section-head reveal\">\n      <p class=\"eyebrow\">Why We Trust Them<\u002Fp>\n      <h2 class=\"h2\">A partner worthy of your business —<br>and our reputation.<\u002Fh2>\n      <p class=\"lead\" style=\"margin-top:18px\">We only introduce clients to partners we'd use ourselves. Our Microsoft partner has earned that trust over fifteen years and a thousand projects.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"why\">\n      <div class=\"why__item reveal\" data-delay=\"1\"><span class=\"i-shield\"><\u002Fspan><h4>Microsoft Gold Partner<\u002Fh4><p>Certified expertise across the full Microsoft technology stack, delivered to best-practice standards.<\u002Fp><\u002Fdiv>\n      <div class=\"why__item reveal\" data-delay=\"2\"><span class=\"i-award\"><
